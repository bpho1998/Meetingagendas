name: SF BOS Agenda Notifier

on:
  schedule:
    - cron: "0 17 * * *"
    - cron: "0 1  * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-agendas:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run agenda checker
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LOOKBACK_HOURS: "13"
        run: python check_agendas.py

      - name: Commit updated seen_event_ids.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_event_ids.json
          git diff --staged --quiet || git commit -m "chore: update seen event IDs [skip ci]"
          git push
